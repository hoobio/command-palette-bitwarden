name: Build & Release

on:
  push:
    branches: [main, dev]
    paths:
      - "**.cs"
      - "**.csproj"
      - "*.props"
      - "*.targets"
      - ".editorconfig"
      - "**/Package.appxmanifest"
      - "version.txt"
      - ".github/workflows/build.yaml"
      - "release-please-config.json"
      - ".release-please-manifest.json"
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  DOTNET_SDK_VERSION: "10.0.x"
  SOLUTION_PATH: HoobiBitwardenCommandPaletteExtension.slnx
  PROJECT_PATH: HoobiBitwardenCommandPaletteExtension/HoobiBitwardenCommandPaletteExtension.csproj
  APPXMANIFEST_PATH: HoobiBitwardenCommandPaletteExtension/Package.appxmanifest
  ASSET_BASE_NAME: HoobiBitwardenCommandPaletteExtension
  BOM_FILE: sbom.cdx.json
  # NOTE: GitHub Actions does not allow expressions in `uses:` refs, so the
  # pipeline-tools pin is repeated in each `uses:` line below. Bump in lockstep.
  # Current pin: hoobio/pipeline-tools @ v1.4.0 (adds optional WACK PR comments).

jobs:
  detect-changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code_changed:
              - "**.cs"
              - "**.csproj"
              - "*.props"
              - "*.targets"
              - ".editorconfig"
              - "**/Package.appxmanifest"
              - "version.txt"
              - ".github/workflows/build.yaml"
              - "release-please-config.json"
              - ".release-please-manifest.json"

      - name: Summarize skip
        if: steps.filter.outputs.code_changed == 'false'
        run: |
          echo "::notice::No code changes detected; build, lint-and-test, and WACK will be skipped"
          echo "### 💭 No code changes detected" >> "$GITHUB_STEP_SUMMARY"
          echo "Build, lint-and-test, and WACK checks were skipped because this PR only contains non-code changes." >> "$GITHUB_STEP_SUMMARY"

  release-please:
    name: Release Please
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: hoobio/pipeline-tools/pipeline/github/step/release-please@v1.4.0
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          app-private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

  lint-and-test:
    needs: [detect-changes]
    if: always() && (needs.detect-changes.result == 'skipped' || needs.detect-changes.outputs.code_changed == 'true')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Restore
        run: dotnet restore -p:Platform=x64

      - name: Lint (build with TreatWarningsAsErrors)
        run: dotnet build -c Release -p:Platform=x64 --no-restore

      - name: Test with coverage
        run: >-
          dotnet test -p:Platform=x64 --no-build -c Release
          --collect:"XPlat Code Coverage"
          --results-directory ${{ github.workspace }}/coverage

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: ${{ github.workspace }}/coverage/**/coverage.cobertura.xml
          targetdir: ${{ github.workspace }}/coverage/report
          reporttypes: HtmlInline;Cobertura;MarkdownSummaryGithub

      - name: Publish coverage summary to job
        run: |
          $summary = Get-Content "${{ github.workspace }}/coverage/report/SummaryGithub.md" -Raw
          $summary | Out-File -Append $env:GITHUB_STEP_SUMMARY
        shell: pwsh

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ${{ github.workspace }}/coverage/report/

      - name: Enforce coverage threshold on changed files
        if: github.event_name == 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Patterns excluded from threshold; defined in .github/coverage-exclusions.json
          $exclusions = Get-Content "${{ github.workspace }}/.github/coverage-exclusions.json" | ConvertFrom-Json
          $excludeFromThreshold = $exclusions | Select-Object -ExpandProperty pattern

          $changedFiles = git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.cs' |
            Where-Object { $_ -notmatch '\.Tests[\\/]' } |
            ForEach-Object { (Resolve-Path $_).Path }

          if (-not $changedFiles) {
            Write-Host "No C# source files changed in this PR, skipping coverage check"
            exit 0
          }

          [xml]$cobertura = Get-Content "${{ github.workspace }}/coverage/report/Cobertura.xml"
          $fileMap = @{}

          foreach ($pkg in $cobertura.coverage.packages.package) {
            foreach ($cls in $pkg.classes.class) {
              $file = $cls.filename
              if ($changedFiles | Where-Object { $file -eq $_ }) {
                $rel = ($file -replace [regex]::Escape("${{ github.workspace }}$([IO.Path]::DirectorySeparatorChar)"), '')
                if (-not $fileMap.ContainsKey($rel)) { $fileMap[$rel] = @{ Covered=0; Total=0 } }
                foreach ($line in $cls.lines.line) {
                  $fileMap[$rel].Total++
                  if ([int]$line.hits -gt 0) { $fileMap[$rel].Covered++ }
                }
              }
            }
          }

          if ($fileMap.Count -eq 0) {
            Write-Host "No coverable lines found in changed files, skipping"
            exit 0
          }

          $fileStats = $fileMap.GetEnumerator() | ForEach-Object {
            $pct = if ($_.Value.Total -gt 0) { [math]::Round(($_.Value.Covered / $_.Value.Total) * 100, 1) } else { 0 }
            $fileKey = $_.Key
            $matchedExclusion = $exclusions | Where-Object { $fileKey -match $_.pattern } | Select-Object -First 1
            [pscustomobject]@{ File=$_.Key; Covered=$_.Value.Covered; Total=$_.Value.Total; Pct=$pct; Excluded=($null -ne $matchedExclusion); Reason=$matchedExclusion.reason }
          }

          $thresholdFiles = $fileStats | Where-Object { -not $_.Excluded }
          $thresholdTotal = ($thresholdFiles | Measure-Object -Property Total -Sum).Sum
          $thresholdCovered = ($thresholdFiles | Measure-Object -Property Covered -Sum).Sum
          $thresholdPct = if ($thresholdTotal -gt 0) { [math]::Round(($thresholdCovered / $thresholdTotal) * 100, 2) } else { 100 }

          $allTotal = ($fileStats | Measure-Object -Property Total -Sum).Sum
          $allCovered = ($fileStats | Measure-Object -Property Covered -Sum).Sum
          $allPct = if ($allTotal -gt 0) { [math]::Round(($allCovered / $allTotal) * 100, 2) } else { 100 }
          $threshold = 50

          $repoUrl = "https://github.com/${{ github.repository }}"
          $headSha = "${{ github.event.pull_request.head.sha }}"

          $icon = if ($thresholdPct -ge $threshold) { ':white_check_mark:' } else { ':x:' }
          $body = "## $icon Code Coverage: Changed Files`n`n"
          $body += "| Coverage | Lines | File |`n|---|---|---|`n"
          foreach ($f in $fileStats | Sort-Object { if ($_.Excluded) { -1 } else { $_.Pct } } -Descending) {
            $parts = $f.File -split '[/\\]'
            $displayName = ($parts | Select-Object -Last 2) -join '\'
            $urlPath = $f.File -replace '\\', '/'
            $fileLink = "[$displayName]($repoUrl/blob/$headSha/$urlPath)"
            if ($f.Excluded) {
              $body += "| :warning: Excluded | $($f.Covered)/$($f.Total) | ${fileLink}: *$($f.Reason)* |`n"
            } else {
              $bar = if ($f.Pct -ge 80) { ':green_circle:' } elseif ($f.Pct -ge 50) { ':yellow_circle:' } else { ':red_circle:' }
              $body += "| $bar $($f.Pct)% | $($f.Covered)/$($f.Total) | $fileLink |`n"
            }
          }
          $body += "`n**Testable: $thresholdPct%** ($thresholdCovered/$thresholdTotal lines, threshold: $threshold%)"
          if ($thresholdTotal -ne $allTotal) { $body += " | Overall: $allPct% ($allCovered/$allTotal)" }
          $body += "`n<!-- coverage-bot -->"

          $prNumber = "${{ github.event.pull_request.number }}"
          $existing = gh api "repos/${{ github.repository }}/issues/$prNumber/comments" --paginate --jq '.[] | select(.body | contains("<!-- coverage-bot -->")) | .id' 2>$null | Select-Object -First 1
          if ($existing) {
            gh api --method PATCH "repos/${{ github.repository }}/issues/comments/$existing" -f body=$body | Out-Null
            Write-Host "Updated existing coverage comment"
          } else {
            gh pr comment $prNumber --body $body
            Write-Host "Created coverage comment"
          }

          Write-Host "Testable coverage: $thresholdPct% ($thresholdCovered/$thresholdTotal lines, threshold: $threshold%)"
          if ($thresholdPct -lt $threshold) {
            Write-Host "::error::Coverage on testable changed files ($thresholdPct%) is below the $threshold% threshold"
            exit 1
          }

  build-msix:
    name: Build MSIX (${{ matrix.platform }})
    needs: [detect-changes]
    if: always() && (needs.detect-changes.result == 'skipped' || needs.detect-changes.outputs.code_changed == 'true')
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, ARM64]
    env:
      # Sign on release-please PRs and on main pushes; PRs from contributors stay unsigned.
      SHOULD_SIGN: ${{ (github.event_name == 'pull_request' && github.head_ref == 'release-please--branches--main') || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
      HAS_SIGNING_CERT: ${{ secrets.SIGNING_CERTIFICATE != '' && vars.SIGNING_CERT_THUMBPRINT != '' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          "version=$ver" | Out-File -Append $env:GITHUB_OUTPUT
          "APP_VERSION=$ver" | Out-File -Append $env:GITHUB_ENV

      - name: Stamp Package.appxmanifest version
        uses: hoobio/pipeline-tools/pipeline/github/step/stamp-msix-version@v1.4.0
        with:
          manifest-path: ${{ env.APPXMANIFEST_PATH }}
          version: ${{ steps.version.outputs.version }}

      - name: Build MSIX
        uses: hoobio/pipeline-tools/pipeline/github/step/build-msix-dotnet@v1.4.0
        with:
          project-path: ${{ env.PROJECT_PATH }}
          platform: ${{ matrix.platform }}
          output-dir: ${{ github.workspace }}\AppPackages

      # `dotnet publish` lands the MSIX nested under
      # AppPackages\<pkg>_<v>.<rev>_<plat>_Test\<pkg>_<v>.<rev>_<plat>.msix.
      # Stage it to a flat directory under a consistent name so the signing step,
      # artifact upload, and release attachment all see a clean path.
      - name: Stage MSIX
        shell: pwsh
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ steps.version.outputs.version }}
          STAGE_DIR: ${{ github.workspace }}\staging\msix-${{ matrix.platform }}
        run: |
          $msix = Get-ChildItem -Path "${{ github.workspace }}\AppPackages" -Recurse -Filter *.msix -ErrorAction Stop |
            Where-Object { $_.FullName -notmatch '\\Dependencies\\' } |
            Select-Object -First 1
          if (-not $msix) { throw "No MSIX produced by dotnet publish" }
          New-Item -ItemType Directory -Path $env:STAGE_DIR -Force | Out-Null
          $dest = Join-Path $env:STAGE_DIR ("${{ env.ASSET_BASE_NAME }}-{0}-{1}.msix" -f $env:VERSION, $env:PLATFORM)
          Copy-Item -LiteralPath $msix.FullName -Destination $dest -Force
          Write-Host "Staged MSIX: $dest"

      - name: Sign MSIX
        if: env.SHOULD_SIGN == 'true' && env.HAS_SIGNING_CERT == 'true'
        uses: hoobio/pipeline-tools/pipeline/github/step/sign-msix@v1.4.0
        with:
          pfx-base64: ${{ secrets.SIGNING_CERTIFICATE }}
          pfx-password: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          thumbprint: ${{ vars.SIGNING_CERT_THUMBPRINT }}
          packages-path: ${{ github.workspace }}\staging\msix-${{ matrix.platform }}

      - name: Skip-sign notice
        if: env.SHOULD_SIGN != 'true' || env.HAS_SIGNING_CERT != 'true'
        shell: bash
        run: echo "::warning::MSIX produced unsigned (SHOULD_SIGN=$SHOULD_SIGN, HAS_SIGNING_CERT=$HAS_SIGNING_CERT)."

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: msix-${{ matrix.platform }}
          path: ${{ github.workspace }}\staging\msix-${{ matrix.platform }}\${{ env.ASSET_BASE_NAME }}-${{ steps.version.outputs.version }}-${{ matrix.platform }}.msix
          if-no-files-found: error

  wack:
    name: WACK (${{ matrix.platform }})
    needs: [build-msix, detect-changes]
    if: always() && needs.build-msix.result == 'success' && (needs.detect-changes.result == 'skipped' || needs.detect-changes.outputs.code_changed == 'true')
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, ARM64]
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/wack-exclusions.json
          sparse-checkout-cone-mode: false

      - name: Download MSIX
        uses: actions/download-artifact@v8
        with:
          name: msix-${{ matrix.platform }}
          path: msix

      - name: Run WACK
        uses: hoobio/pipeline-tools/pipeline/github/step/run-wack@v1.4.0
        with:
          msix-path: msix
          report-path: wack-report-${{ matrix.platform }}.xml
          exclusions-path: .github/wack-exclusions.json
          platform: ${{ matrix.platform }}
          fail-on-error: 'true'
          github-token: ${{ github.token }}

      - name: Upload WACK report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wack-report-${{ matrix.platform }}
          path: wack-report-${{ matrix.platform }}.xml
          if-no-files-found: warn

  sbom:
    name: SBOM
    needs: [detect-changes]
    if: always() && (needs.detect-changes.result == 'skipped' || needs.detect-changes.outputs.code_changed == 'true')
    runs-on: windows-latest
    env:
      DT_HOST: ${{ secrets.DT_HOST }}
      DT_API_KEY: ${{ secrets.DT_API_KEY }}
      IS_RELEASE: ${{ github.event_name == 'release' }}
      REF_TAG_PREFIX: ${{ github.event_name == 'release' && 'tag' || 'branch' }}
      PROJECT_VERSION: ${{ github.event_name == 'release' && github.ref_name || github.sha }}
      PARENT_VERSION: ${{ github.event_name == 'release' && 'release' || 'main' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Generate CycloneDX SBOM
        uses: hoobio/pipeline-tools/pipeline/github/step/cyclonedx-sbom-dotnet@v1.4.0
        with:
          solution-path: ${{ env.SOLUTION_PATH }}
          output-path: ${{ env.BOM_FILE }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: ${{ env.BOM_FILE }}
          if-no-files-found: error

      - name: Upload SBOM to Dependency-Track
        if: env.DT_HOST != '' && env.DT_API_KEY != ''
        uses: hoobio/pipeline-tools/pipeline/github/job/upload-sbom-to-dependency-track@v1.4.0
        with:
          bom-path: ${{ env.BOM_FILE }}
          upload-artifact: 'false'
          server-url: https://${{ env.DT_HOST }}
          api-key: ${{ env.DT_API_KEY }}
          project-name: ${{ github.event.repository.name }}
          project-version: ${{ env.PROJECT_VERSION }}
          project-tags: ${{ env.REF_TAG_PREFIX }}=${{ github.ref_name }},repo=${{ github.repository }},commit=${{ github.sha }},run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          parent-name: ${{ github.event.repository.name }}
          parent-version: ${{ env.PARENT_VERSION }}
          mark-latest: ${{ env.IS_RELEASE }}
          prune-stale-children: ${{ env.IS_RELEASE != 'true' }}
          keep: ${{ github.event_name == 'workflow_dispatch' && '1' || '10' }}

      - name: Skip notice if Dependency-Track secrets not configured
        if: env.DT_HOST == '' || env.DT_API_KEY == ''
        shell: bash
        run: echo "::warning::DT_HOST or DT_API_KEY secret not set; skipping Dependency-Track upload."

  release:
    name: Publish Release
    needs: [release-please, lint-and-test, build-msix, wack, sbom]
    if: >-
      always()
      && needs.release-please.outputs.release_created == 'true'
      && needs.lint-and-test.result == 'success'
      && needs.build-msix.result == 'success'
      && needs.wack.result == 'success'
      && needs.sbom.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - name: Download MSIX (x64)
        uses: actions/download-artifact@v8
        with:
          name: msix-x64
          path: release/msix-x64
      - name: Download MSIX (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: msix-ARM64
          path: release/msix-ARM64
      - name: Download SBOM
        uses: actions/download-artifact@v8
        with:
          name: sbom
          path: release/sbom
      - name: Download WACK report (x64)
        uses: actions/download-artifact@v8
        with:
          name: wack-report-x64
          path: release/wack-x64
      - name: Download WACK report (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: wack-report-ARM64
          path: release/wack-ARM64

      - name: Attest installer provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "release/msix-*/*.msix"

      - name: Attach all artefacts to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          mapfile -t RELEASE_FILES < <(find release -type f \( \
            -name '*.msix' -o \
            -name '*.cdx.json' -o \
            -name 'wack-report-*.xml' \))
          if [ "${#RELEASE_FILES[@]}" -eq 0 ]; then
            echo "::error::No release files found to attach"
            exit 1
          fi
          printf 'Attaching: %s\n' "${RELEASE_FILES[@]}"
          gh release upload "$TAG" "${RELEASE_FILES[@]}" --clobber --repo "${{ github.repository }}"

      - name: Append trust signal to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          ID=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" --jq '.id')
          BODY=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" --jq '.body // ""')
          TRUST=$'\n\n---\n> ✅ WACK certified (x64, ARM64) · \U0001F512 [CodeQL scanned](https://github.com/${{ github.repository }}/actions/workflows/codeql.yml)'
          jq -n --arg body "${BODY}${TRUST}" '{body: $body}' \
            | gh api --method PATCH "repos/${{ github.repository }}/releases/$ID" --input -

      - name: Publish draft release
        uses: hoobio/pipeline-tools/pipeline/github/step/publish-github-release@v1.4.0
        with:
          tag: ${{ needs.release-please.outputs.tag_name }}
          github-token: ${{ github.token }}

  pre-release:
    name: Pre-Release
    needs: [build-msix, lint-and-test]
    if: >-
      always()
      && github.event_name == 'pull_request'
      && github.head_ref == 'release-please--branches--main'
      && needs.build-msix.result == 'success'
      && needs.lint-and-test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Generate release notes
        id: notes
        run: |
          VERSION_PREFIX="v${{ steps.version.outputs.version }}-pre."
          # Find the most recent pre-release tag for this version, or fall back to last stable tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -m1 "^${VERSION_PREFIX}" || true)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git tag --sort=-version:refname | grep -m1 '^v[0-9]' || true)
          fi
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "$NOTES" > /tmp/release_notes.txt
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download MSIX (x64)
        uses: actions/download-artifact@v8
        with:
          name: msix-x64
          path: release/x64

      - name: Download MSIX (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: msix-ARM64
          path: release/ARM64

      - name: Create pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}-pre.${{ github.run_number }}
          name: v${{ steps.version.outputs.version }}-pre.${{ github.run_number }}
          prerelease: true
          make_latest: false
          body_path: /tmp/release_notes.txt
          files: |
            release/**/*.msix

      - name: Prune old pre-releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: 3
        run: |
          VERSION_PREFIX="v${{ steps.version.outputs.version }}-pre."
          RELEASES=$(gh release list \
            --repo ${{ github.repository }} \
            --limit 100 \
            --json tagName,isPrerelease \
            --jq "[.[] | select(.isPrerelease == true and (.tagName | startswith(\"$VERSION_PREFIX\")))] | sort_by(.tagName) | reverse | .[${KEEP}:] | .[].tagName")
          for TAG in $RELEASES; do
            echo "Deleting old pre-release: $TAG"
            gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag
          done
