name: Build & Release

on:
  push:
    branches: [main, dev]
    paths:
      - "**.cs"
      - "**.csproj"
      - "*.props"
      - "*.targets"
      - ".editorconfig"
      - "**/Package.appxmanifest"
      - "installer/**"
      - "version.txt"
      - ".github/workflows/build.yaml"
      - "release-please-config.json"
      - ".release-please-manifest.json"
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  DOTNET_SDK_VERSION: "10.0.x"
  SOLUTION_PATH: HoobiBitwardenCommandPaletteExtension.slnx
  # The companion WinUI app owns the MSIX (the extension ships as a guest exe inside it), so the
  # package project + manifest are the companion's.
  PROJECT_PATH: HoobiBitwardenCompanion/HoobiBitwardenCompanion.csproj
  APPXMANIFEST_PATH: HoobiBitwardenCompanion/Package.appxmanifest
  WIX_SOURCE_PATH: installer/HoobiBitwardenCommandPaletteExtension.wxs
  ASSET_BASE_NAME: HoobiBitwardenCommandPaletteExtension
  BOM_FILE: sbom.cdx.json
  # NOTE: GitHub Actions does not allow expressions in `uses:` refs, so the
  # pipeline-tools pin is repeated in each `uses:` line below. Bump in lockstep.
  # Current pin: hoobio/pipeline-tools @ v1.6.0 (adds App-token auth to
  # publish-github-release so `release: published` fires downstream workflows).

jobs:
  detect-changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code_changed:
              - "**.cs"
              - "**.csproj"
              - "*.props"
              - "*.targets"
              - ".editorconfig"
              - "**/Package.appxmanifest"
              - "installer/**"
              - "version.txt"
              - ".github/workflows/build.yaml"
              - "release-please-config.json"
              - ".release-please-manifest.json"

      - name: Summarize skip
        if: steps.filter.outputs.code_changed == 'false'
        run: |
          echo "::notice::No code changes detected; build, lint-and-test, and WACK will be skipped"
          echo "### 💭 No code changes detected" >> "$GITHUB_STEP_SUMMARY"
          echo "Build, lint-and-test, and WACK checks were skipped because this PR only contains non-code changes." >> "$GITHUB_STEP_SUMMARY"

  release-please:
    name: Release Please
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: hoobio/pipeline-tools/pipeline/github/step/release-please@v2.3.1
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          app-private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

  lint-and-test:
    needs: [detect-changes]
    if: always() && (needs.detect-changes.result == 'skipped' || needs.detect-changes.outputs.code_changed == 'true')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Restore
        run: dotnet restore -p:Platform=x64

      - name: Lint (build with TreatWarningsAsErrors)
        run: dotnet build -c Release -p:Platform=x64 --no-restore

      # The xUnit suite is occasionally flaky on hosted runners (intermittent
      # SignalR/HTTP timeouts in Watchtower / VaultItemHelper tests). Retry up
      # to 3 times before failing the job; clean the coverage dir between
      # attempts so ReportGenerator only aggregates the successful run.
      - name: Test with coverage
        shell: pwsh
        run: |
          $maxAttempts = 3
          $coverageDir = "${{ github.workspace }}/coverage"
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
              if (Test-Path $coverageDir) {
                  Remove-Item -Recurse -Force $coverageDir -ErrorAction SilentlyContinue
              }
              Write-Host "::group::dotnet test (attempt $attempt of $maxAttempts)"
              dotnet test -p:Platform=x64 --no-build -c Release `
                  --collect:"XPlat Code Coverage" `
                  --results-directory $coverageDir
              $code = $LASTEXITCODE
              Write-Host "::endgroup::"
              if ($code -eq 0) {
                  if ($attempt -gt 1) {
                      Write-Host "::warning::Tests passed on attempt $attempt of $maxAttempts (previous attempts were flaky)"
                  }
                  exit 0
              }
              if ($attempt -lt $maxAttempts) {
                  Write-Host "::warning::Tests failed (exit $code) on attempt $attempt; retrying..."
                  Start-Sleep -Seconds 5
              }
          }
          Write-Error "Tests failed after $maxAttempts attempts"
          exit 1

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: ${{ github.workspace }}/coverage/**/coverage.cobertura.xml
          targetdir: ${{ github.workspace }}/coverage/report
          reporttypes: HtmlInline;Cobertura;MarkdownSummaryGithub

      - name: Publish coverage summary to job
        run: |
          $summary = Get-Content "${{ github.workspace }}/coverage/report/SummaryGithub.md" -Raw
          $summary | Out-File -Append $env:GITHUB_STEP_SUMMARY
        shell: pwsh

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ${{ github.workspace }}/coverage/report/

      - name: Enforce coverage threshold on changed files
        if: github.event_name == 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Patterns excluded from threshold; defined in .github/coverage-exclusions.json
          $exclusions = Get-Content "${{ github.workspace }}/.github/coverage-exclusions.json" | ConvertFrom-Json
          $excludeFromThreshold = $exclusions | Select-Object -ExpandProperty pattern

          $changedFiles = git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.cs' |
            Where-Object { $_ -notmatch '\.Tests[\\/]' } |
            ForEach-Object { (Resolve-Path $_).Path }

          if (-not $changedFiles) {
            Write-Host "No C# source files changed in this PR, skipping coverage check"
            exit 0
          }

          [xml]$cobertura = Get-Content "${{ github.workspace }}/coverage/report/Cobertura.xml"
          $fileMap = @{}

          foreach ($pkg in $cobertura.coverage.packages.package) {
            foreach ($cls in $pkg.classes.class) {
              $file = $cls.filename
              if ($changedFiles | Where-Object { $file -eq $_ }) {
                $rel = ($file -replace [regex]::Escape("${{ github.workspace }}$([IO.Path]::DirectorySeparatorChar)"), '')
                if (-not $fileMap.ContainsKey($rel)) { $fileMap[$rel] = @{ Covered=0; Total=0 } }
                foreach ($line in $cls.lines.line) {
                  $fileMap[$rel].Total++
                  if ([int]$line.hits -gt 0) { $fileMap[$rel].Covered++ }
                }
              }
            }
          }

          if ($fileMap.Count -eq 0) {
            Write-Host "No coverable lines found in changed files, skipping"
            exit 0
          }

          $fileStats = $fileMap.GetEnumerator() | ForEach-Object {
            $pct = if ($_.Value.Total -gt 0) { [math]::Round(($_.Value.Covered / $_.Value.Total) * 100, 1) } else { 0 }
            $fileKey = $_.Key
            $matchedExclusion = $exclusions | Where-Object { $fileKey -match $_.pattern } | Select-Object -First 1
            [pscustomobject]@{ File=$_.Key; Covered=$_.Value.Covered; Total=$_.Value.Total; Pct=$pct; Excluded=($null -ne $matchedExclusion); Reason=$matchedExclusion.reason }
          }

          $thresholdFiles = $fileStats | Where-Object { -not $_.Excluded }
          $thresholdTotal = ($thresholdFiles | Measure-Object -Property Total -Sum).Sum
          $thresholdCovered = ($thresholdFiles | Measure-Object -Property Covered -Sum).Sum
          $thresholdPct = if ($thresholdTotal -gt 0) { [math]::Round(($thresholdCovered / $thresholdTotal) * 100, 2) } else { 100 }

          $allTotal = ($fileStats | Measure-Object -Property Total -Sum).Sum
          $allCovered = ($fileStats | Measure-Object -Property Covered -Sum).Sum
          $allPct = if ($allTotal -gt 0) { [math]::Round(($allCovered / $allTotal) * 100, 2) } else { 100 }
          $threshold = 50

          $repoUrl = "https://github.com/${{ github.repository }}"
          $headSha = "${{ github.event.pull_request.head.sha }}"

          $icon = if ($thresholdPct -ge $threshold) { ':white_check_mark:' } else { ':x:' }
          $body = "## $icon Code Coverage: Changed Files`n`n"
          $body += "| Coverage | Lines | File |`n|---|---|---|`n"
          foreach ($f in $fileStats | Sort-Object { if ($_.Excluded) { -1 } else { $_.Pct } } -Descending) {
            $parts = $f.File -split '[/\\]'
            $displayName = ($parts | Select-Object -Last 2) -join '\'
            $urlPath = $f.File -replace '\\', '/'
            $fileLink = "[$displayName]($repoUrl/blob/$headSha/$urlPath)"
            if ($f.Excluded) {
              $body += "| :warning: Excluded | $($f.Covered)/$($f.Total) | ${fileLink}: *$($f.Reason)* |`n"
            } else {
              $bar = if ($f.Pct -ge 80) { ':green_circle:' } elseif ($f.Pct -ge 50) { ':yellow_circle:' } else { ':red_circle:' }
              $body += "| $bar $($f.Pct)% | $($f.Covered)/$($f.Total) | $fileLink |`n"
            }
          }
          $body += "`n**Testable: $thresholdPct%** ($thresholdCovered/$thresholdTotal lines, threshold: $threshold%)"
          if ($thresholdTotal -ne $allTotal) { $body += " | Overall: $allPct% ($allCovered/$allTotal)" }
          $body += "`n<!-- coverage-bot -->"

          $prNumber = "${{ github.event.pull_request.number }}"
          $existing = gh api "repos/${{ github.repository }}/issues/$prNumber/comments" --paginate --jq '.[] | select(.body | contains("<!-- coverage-bot -->")) | .id' 2>$null | Select-Object -First 1
          if ($existing) {
            gh api --method PATCH "repos/${{ github.repository }}/issues/comments/$existing" -f body=$body | Out-Null
            Write-Host "Updated existing coverage comment"
          } else {
            gh pr comment $prNumber --body $body
            Write-Host "Created coverage comment"
          }

          Write-Host "Testable coverage: $thresholdPct% ($thresholdCovered/$thresholdTotal lines, threshold: $threshold%)"
          if ($thresholdPct -lt $threshold) {
            Write-Host "::error::Coverage on testable changed files ($thresholdPct%) is below the $threshold% threshold"
            exit 1
          }

  build-msix:
    name: Build MSIX (${{ matrix.platform }})
    needs: [detect-changes]
    # Always run so the required check posts a status even on non-code PRs.
    # Heavy steps gate on env.SHOULD_BUILD; the no-op path posts a notice and
    # exits 0. Use Linux for the skip path (sub-10s spin-up) and Windows only
    # when there's an actual MSIX to produce.
    if: always() && needs.detect-changes.result != 'cancelled' && needs.detect-changes.result != 'failure'
    runs-on: ${{ (needs.detect-changes.result == 'skipped' || needs.detect-changes.outputs.code_changed == 'true') && 'windows-latest' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, ARM64]
    env:
      # True for code-bearing PRs and for non-pull_request events (push/workflow_dispatch/release).
      SHOULD_BUILD: ${{ needs.detect-changes.result == 'skipped' || needs.detect-changes.outputs.code_changed == 'true' }}
      # Sign on release-please PRs and on main pushes; PRs from contributors stay unsigned.
      SHOULD_SIGN: ${{ (github.event_name == 'pull_request' && github.head_ref == 'release-please--branches--main') || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
      HAS_SIGNING_CERT: ${{ secrets.SIGNING_CERTIFICATE != '' && vars.SIGNING_CERT_THUMBPRINT != '' }}
      # Side-by-side package identity. The release-please pre-release PR builds the Prerelease
      # channel (its own Identity Name, DisplayName, and COM CLSID); every other shipped build
      # is Release. MSBuild promotes this env var to the $(PackageChannel) property the .csproj
      # reads. Local Debug builds default to the Dev channel.
      PackageChannel: ${{ (github.event_name == 'pull_request' && github.head_ref == 'release-please--branches--main') && 'Prerelease' || 'Release' }}
    steps:
      - name: Skip notice (no code changes)
        if: env.SHOULD_BUILD != 'true'
        shell: bash
        run: |
          echo "::notice::No code changes; MSIX build skipped for ${{ matrix.platform }}"
          echo "### 💭 No MSIX build needed (${{ matrix.platform }})" >> "$GITHUB_STEP_SUMMARY"
          echo "Build was skipped because this PR has no code changes. Reporting success so the required check passes." >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/checkout@v7
        if: env.SHOULD_BUILD == 'true'

      - uses: actions/setup-dotnet@v5
        if: env.SHOULD_BUILD == 'true'
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Read version
        id: version
        if: env.SHOULD_BUILD == 'true'
        shell: pwsh
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          "version=$ver" | Out-File -Append $env:GITHUB_OUTPUT
          "APP_VERSION=$ver" | Out-File -Append $env:GITHUB_ENV

      - name: Stamp Package.appxmanifest version
        if: env.SHOULD_BUILD == 'true'
        uses: hoobio/pipeline-tools/pipeline/github/step/stamp-msix-version@v2.3.1
        with:
          manifest-path: ${{ env.APPXMANIFEST_PATH }}
          version: ${{ steps.version.outputs.version }}

      # Unsigned (PR / contributor) builds can only be installed via
      # `Add-AppxPackage -AllowUnsigned` when the publisher sits in the reserved
      # unsigned namespace (the OID below). Windows also guarantees this identity
      # never collides with the signed/Store build, so it's safe to diverge here.
      # Signed builds skip this and keep the certificate-matching publisher.
      - name: Use unsigned-namespace publisher (unsigned builds only)
        if: env.SHOULD_BUILD == 'true' && (env.SHOULD_SIGN != 'true' || env.HAS_SIGNING_CERT != 'true')
        shell: pwsh
        env:
          MANIFEST: ${{ env.APPXMANIFEST_PATH }}
        run: |
          [xml]$doc = Get-Content -LiteralPath $env:MANIFEST -Raw
          $nsm = New-Object System.Xml.XmlNamespaceManager($doc.NameTable)
          $nsm.AddNamespace('d', 'http://schemas.microsoft.com/appx/manifest/foundation/windows10')
          $identity = $doc.SelectSingleNode('/d:Package/d:Identity', $nsm)
          if (-not $identity) { throw 'Identity element not found in manifest' }
          $identity.SetAttribute('Publisher', 'CN=Hoobi, OID.2.25.311729368913984317654407730594956997722=1')
          $doc.Save((Resolve-Path -LiteralPath $env:MANIFEST).Path)
          Write-Host "::notice::Unsigned build - publisher set to the unsigned namespace; install with: Add-AppxPackage -Path <pkg>.msix -AllowUnsigned"

      - name: Build MSIX
        if: env.SHOULD_BUILD == 'true'
        uses: hoobio/pipeline-tools/pipeline/github/step/build-msix-dotnet@v2.3.1
        with:
          project-path: ${{ env.PROJECT_PATH }}
          platform: ${{ matrix.platform }}
          output-dir: ${{ github.workspace }}\AppPackages

      # `dotnet publish` lands the MSIX nested under
      # AppPackages\<pkg>_<v>.<rev>_<plat>_Test\<pkg>_<v>.<rev>_<plat>.msix.
      # Stage it to a flat directory under a consistent name so the signing step,
      # artifact upload, and release attachment all see a clean path.
      - name: Stage MSIX
        if: env.SHOULD_BUILD == 'true'
        shell: pwsh
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ steps.version.outputs.version }}
          STAGE_DIR: ${{ github.workspace }}\staging\msix-${{ matrix.platform }}
        run: |
          $msix = Get-ChildItem -Path "${{ github.workspace }}\AppPackages" -Recurse -Filter *.msix -ErrorAction Stop |
            Where-Object { $_.FullName -notmatch '\\Dependencies\\' } |
            Select-Object -First 1
          if (-not $msix) { throw "No MSIX produced by dotnet publish" }
          New-Item -ItemType Directory -Path $env:STAGE_DIR -Force | Out-Null
          $dest = Join-Path $env:STAGE_DIR ("${{ env.ASSET_BASE_NAME }}-{0}-{1}.msix" -f $env:VERSION, $env:PLATFORM)
          Copy-Item -LiteralPath $msix.FullName -Destination $dest -Force
          Write-Host "Staged MSIX: $dest"

      - name: Sign MSIX
        if: env.SHOULD_BUILD == 'true' && env.SHOULD_SIGN == 'true' && env.HAS_SIGNING_CERT == 'true'
        uses: hoobio/pipeline-tools/pipeline/github/step/sign-msix@v2.3.1
        with:
          pfx-base64: ${{ secrets.SIGNING_CERTIFICATE }}
          pfx-password: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          thumbprint: ${{ vars.SIGNING_CERT_THUMBPRINT }}
          packages-path: ${{ github.workspace }}\staging\msix-${{ matrix.platform }}

      - name: Skip-sign notice
        if: env.SHOULD_BUILD == 'true' && (env.SHOULD_SIGN != 'true' || env.HAS_SIGNING_CERT != 'true')
        shell: bash
        run: echo "::warning::MSIX produced unsigned (SHOULD_SIGN=$SHOULD_SIGN, HAS_SIGNING_CERT=$HAS_SIGNING_CERT)."

      - name: Upload MSIX artifact
        if: env.SHOULD_BUILD == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: msix-${{ matrix.platform }}
          path: ${{ github.workspace }}\staging\msix-${{ matrix.platform }}\${{ env.ASSET_BASE_NAME }}-${{ steps.version.outputs.version }}-${{ matrix.platform }}.msix
          if-no-files-found: error

  build-msi:
    name: Build MSI (${{ matrix.platform }})
    # MSI is a thin wrapper around the signed MSIX (it ships only the .msix
    # plus the publisher .cer and registers them via custom actions), so it
    # has to wait for build-msix to produce the artifact for the same platform.
    #
    # Only build the MSI when the MSIX would be signed: an unsigned wrapped
    # .msix can't be Add-AppxPackage'd on a normal user machine, so producing
    # a contributor-PR MSI artifact would just be misleading. The condition
    # here mirrors SHOULD_SIGN below (release-please PRs + main pushes).
    needs: [detect-changes, build-msix]
    if: >-
      always()
      && needs.build-msix.result == 'success'
      && (needs.detect-changes.result == 'skipped' || needs.detect-changes.outputs.code_changed == 'true')
      && (
        (github.event_name == 'pull_request' && github.head_ref == 'release-please--branches--main')
        || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, ARM64]
    env:
      # The job-level `if:` already gates on the same conditions as SHOULD_SIGN,
      # so by the time we reach this env block SHOULD_SIGN is always true. We
      # keep the variable for symmetry with build-msix and so a future
      # relaxation of the gate (e.g. allow unsigned MSI builds for testing)
      # only needs to touch the `if:`.
      SHOULD_SIGN: ${{ (github.event_name == 'pull_request' && github.head_ref == 'release-please--branches--main') || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
      HAS_SIGNING_CERT: ${{ secrets.SIGNING_CERTIFICATE != '' && vars.SIGNING_CERT_THUMBPRINT != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          "version=$ver" | Out-File -Append $env:GITHUB_OUTPUT
          "APP_VERSION=$ver" | Out-File -Append $env:GITHUB_ENV

      - name: Download MSIX (${{ matrix.platform }})
        uses: actions/download-artifact@v8
        with:
          name: msix-${{ matrix.platform }}
          path: ${{ github.workspace }}\staging\msix-download-${{ matrix.platform }}

      - name: Stage MSI payload (msix + cert)
        shell: pwsh
        env:
          PLATFORM: ${{ matrix.platform }}
          VERSION: ${{ steps.version.outputs.version }}
          MSIX_DOWNLOAD: ${{ github.workspace }}\staging\msix-download-${{ matrix.platform }}
          PAYLOAD_DIR: ${{ github.workspace }}\staging\msi-payload-${{ matrix.platform }}
        run: |
          New-Item -ItemType Directory -Path $env:PAYLOAD_DIR -Force | Out-Null

          # The build-msix job uploads `${ASSET_BASE_NAME}-<ver>-<plat>.msix`.
          # WiX expects a fixed filename so it can reference the File Id without
          # baking the version into the .wxs. Rename on stage.
          $msix = Get-ChildItem -LiteralPath $env:MSIX_DOWNLOAD -Filter *.msix -ErrorAction Stop | Select-Object -First 1
          if (-not $msix) { throw "No .msix in $env:MSIX_DOWNLOAD" }
          Copy-Item -LiteralPath $msix.FullName `
                    -Destination "$env:PAYLOAD_DIR\HoobiBitwardenCommandPaletteExtension.msix" `
                    -Force

          # Publisher cert from the repo root - the same .cer the README tells
          # users to import manually for raw .msix sideloads. The MSI's
          # ImportCert custom action drops it into Cert:\CurrentUser\TrustedPeople
          # so the bundled .msix's signature chains to a trusted root.
          Copy-Item -LiteralPath "${{ github.workspace }}\HoobiBitwardenCommandPaletteExtension.cer" `
                    -Destination "$env:PAYLOAD_DIR\HoobiBitwardenCommandPaletteExtension.cer" `
                    -Force

          Get-ChildItem $env:PAYLOAD_DIR | Format-Table Name, Length

      # The build-msi-wix action emits `<wxs-base-name>-<version>-<platform>.msi`,
      # which (because the .wxs filename matches ASSET_BASE_NAME) is already the
      # final asset name we want for upload + release.
      - name: Build MSI
        uses: hoobio/pipeline-tools/pipeline/github/step/build-msi-wix@v2.3.1
        with:
          wix-source-path: ${{ env.WIX_SOURCE_PATH }}
          version: ${{ steps.version.outputs.version }}
          platform: ${{ matrix.platform }}
          payload-dir: ${{ github.workspace }}\staging\msi-payload-${{ matrix.platform }}
          output-dir: ${{ github.workspace }}\staging\msi-${{ matrix.platform }}
          # Pin extensions to 5.x; the unversioned form pulls the latest (currently
          # 7.0.0), which fails with "Could not find expected package root folder
          # wixext5. Ensure WixToolset.UI.wixext/7.0.0 is compatible with WiX v5."
          extensions: "WixToolset.UI.wixext/5.0.2,WixToolset.Util.wixext/5.0.2"

      - name: Sign MSI
        if: env.SHOULD_SIGN == 'true' && env.HAS_SIGNING_CERT == 'true'
        uses: hoobio/pipeline-tools/pipeline/github/step/sign-msi@v2.3.1
        with:
          pfx-base64: ${{ secrets.SIGNING_CERTIFICATE }}
          pfx-password: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          thumbprint: ${{ vars.SIGNING_CERT_THUMBPRINT }}
          packages-path: ${{ github.workspace }}\staging\msi-${{ matrix.platform }}

      - name: Skip-sign notice
        if: env.SHOULD_SIGN != 'true' || env.HAS_SIGNING_CERT != 'true'
        shell: bash
        run: echo "::warning::MSI produced unsigned (SHOULD_SIGN=$SHOULD_SIGN, HAS_SIGNING_CERT=$HAS_SIGNING_CERT)."

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: msi-${{ matrix.platform }}
          path: ${{ github.workspace }}\staging\msi-${{ matrix.platform }}\${{ env.ASSET_BASE_NAME }}-${{ steps.version.outputs.version }}-${{ matrix.platform }}.msi
          if-no-files-found: error

  bundle:
    name: Bundle MSIX (all platforms)
    # Combine the per-arch .msix into one signed .msixbundle - the Store artifact
    # (the msstore CLI uploads exactly one package per submission) and an extra
    # release asset. Same gate as build-msi: signed paths only (release-please
    # PRs + main pushes), so the per-arch .msix it consumes are signed.
    needs: [detect-changes, build-msix]
    if: >-
      always()
      && needs.build-msix.result == 'success'
      && (needs.detect-changes.result == 'skipped' || needs.detect-changes.outputs.code_changed == 'true')
      && (
        (github.event_name == 'pull_request' && github.head_ref == 'release-please--branches--main')
        || (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    runs-on: windows-latest
    env:
      HAS_SIGNING_CERT: ${{ secrets.SIGNING_CERTIFICATE != '' && vars.SIGNING_CERT_THUMBPRINT != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          "version=$ver" | Out-File -Append $env:GITHUB_OUTPUT

      # Both per-arch artifacts land in the same folder so makeappx bundles them together.
      - name: Download MSIX (x64)
        uses: actions/download-artifact@v8
        with:
          name: msix-x64
          path: ${{ github.workspace }}\staging\bundle-input
      - name: Download MSIX (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: msix-ARM64
          path: ${{ github.workspace }}\staging\bundle-input

      - name: Build signed .msixbundle
        env:
          PFX_BASE64: ${{ secrets.SIGNING_CERTIFICATE }}
          PFX_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          THUMBPRINT: ${{ vars.SIGNING_CERT_THUMBPRINT }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # Newest x64 makeappx + signtool from the Windows SDK.
          $kit = 'C:\Program Files (x86)\Windows Kits\10\bin'
          function Resolve-SdkTool($name) {
            Get-ChildItem $kit -Recurse -Filter $name -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match '\\x64\\' } |
              Sort-Object { [version]($_.FullName -replace '.*\\(\d+\.\d+\.\d+\.\d+)\\.*', '$1') } -Descending |
              Select-Object -First 1 -ExpandProperty FullName
          }
          $makeappx = Resolve-SdkTool 'makeappx.exe'
          $signtool = Resolve-SdkTool 'signtool.exe'
          if (-not $makeappx -or -not $signtool) { throw 'Windows SDK tooling not found' }

          $outDir = "$env:GITHUB_WORKSPACE\staging\bundle"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          $bundle = Join-Path $outDir "$env:ASSET_BASE_NAME-$env:VERSION.msixbundle"

          & $makeappx bundle /d "$env:GITHUB_WORKSPACE\staging\bundle-input" /p $bundle /bv "$env:VERSION.0" /o
          if ($LASTEXITCODE -ne 0) { throw "makeappx bundle failed ($LASTEXITCODE)" }

          # Sign the bundle (sideloaded from the release; the Store re-signs but
          # accepts a signed bundle). Mirrors the per-arch sign-msix step.
          if ($env:HAS_SIGNING_CERT -eq 'true') {
            $pfx = Join-Path $env:RUNNER_TEMP ([guid]::NewGuid().ToString('N') + '.pfx')
            [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:PFX_BASE64))
            try {
              $sec = ConvertTo-SecureString $env:PFX_PASSWORD -AsPlainText -Force
              Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $sec | Out-Null
            } finally { Remove-Item $pfx -Force -ErrorAction SilentlyContinue }
            & $signtool sign /fd SHA256 /sha1 $env:THUMBPRINT /td SHA256 $bundle
            if ($LASTEXITCODE -ne 0) { throw "signtool failed ($LASTEXITCODE)" }
          } else {
            Write-Host "::warning::Bundle produced unsigned (no signing cert configured)"
          }

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: msixbundle
          path: ${{ github.workspace }}\staging\bundle\*.msixbundle
          if-no-files-found: error

  wack:
    name: WACK (${{ matrix.platform }})
    needs: [build-msix, detect-changes]
    if: always() && needs.build-msix.result == 'success' && (needs.detect-changes.result == 'skipped' || needs.detect-changes.outputs.code_changed == 'true')
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, ARM64]
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: .github/wack-exclusions.json
          sparse-checkout-cone-mode: false

      - name: Download MSIX
        uses: actions/download-artifact@v8
        with:
          name: msix-${{ matrix.platform }}
          path: msix

      - name: Run WACK
        uses: hoobio/pipeline-tools/pipeline/github/step/run-wack@v2.3.1
        with:
          msix-path: msix
          report-path: wack-report-${{ matrix.platform }}.xml
          exclusions-path: .github/wack-exclusions.json
          platform: ${{ matrix.platform }}
          fail-on-error: 'true'
          github-token: ${{ github.token }}

      - name: Upload WACK report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wack-report-${{ matrix.platform }}
          path: wack-report-${{ matrix.platform }}.xml
          if-no-files-found: warn

  sbom:
    name: SBOM
    needs: [detect-changes]
    if: always() && (needs.detect-changes.result == 'skipped' || needs.detect-changes.outputs.code_changed == 'true')
    runs-on: windows-latest
    env:
      DT_HOST: ${{ secrets.DT_HOST }}
      DT_API_KEY: ${{ secrets.DT_API_KEY }}
      DT_DOMAIN: productivity
      DT_SYSTEM: command-palette
      DT_COMPONENT: bitwarden-extension
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      # Channel routing for the Backstage hierarchy in Dependency-Track (v2):
      #   release event              -> channel=release,    mark-latest=true,  no prune
      #   release-please PR (prerelease tag is cut by pre-release job)
      #                              -> channel=prerelease, mark-latest=false, prune
      #   push / dispatch / other PR -> channel=ci + sub-channel=<branch>, mark-latest=false, prune
      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content version.txt -Raw).Trim()
          "version=$ver" | Out-File -Append $env:GITHUB_OUTPUT

      - name: Resolve DT channel
        id: dt
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
          SHA: ${{ github.sha }}
          VERSION: ${{ steps.version.outputs.version }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          $isRelease = $env:EVENT_NAME -eq 'release'
          $isPrerelease = $env:EVENT_NAME -eq 'pull_request' -and $env:HEAD_REF -eq 'release-please--branches--main'

          # v2 Backstage hierarchy: feature/CI builds nest under a shared "ci"
          # channel with the branch as the sub-channel (channel=ci, sub-channel=<branch>).
          # release / prerelease sit directly under the component (no sub-channel).
          $subChannel = ''
          if ($isRelease) {
            $channel = 'release'
            $projectVersion = $env:REF_NAME
            $markLatest = 'true'
            $prune = 'false'
          }
          elseif ($isPrerelease) {
            $channel = 'prerelease'
            $projectVersion = "v$($env:VERSION)-pre.$($env:RUN_NUMBER)"
            $markLatest = 'false'
            $prune = 'true'
          }
          else {
            $branchSource = if ($env:EVENT_NAME -eq 'pull_request') { $env:HEAD_REF } else { $env:REF_NAME }
            $sanitized = ($branchSource -replace '[^A-Za-z0-9._/-]', '-')
            $channel = 'ci'
            $subChannel = $sanitized
            $projectVersion = $env:SHA
            $markLatest = 'false'
            $prune = 'true'
          }

          "channel=$channel"               | Out-File -Append $env:GITHUB_OUTPUT
          "sub_channel=$subChannel"        | Out-File -Append $env:GITHUB_OUTPUT
          "project_version=$projectVersion"| Out-File -Append $env:GITHUB_OUTPUT
          "mark_latest=$markLatest"        | Out-File -Append $env:GITHUB_OUTPUT
          "prune=$prune"                   | Out-File -Append $env:GITHUB_OUTPUT
          Write-Host "Channel:        $channel"
          Write-Host "SubChannel:     $subChannel"
          Write-Host "ProjectVersion: $projectVersion"
          Write-Host "MarkLatest:     $markLatest"
          Write-Host "Prune:          $prune"

      - name: Generate CycloneDX SBOM
        uses: hoobio/pipeline-tools/pipeline/github/step/build-cyclonedx-sbom@v2.3.1
        with:
          app-language: dotnet
          app-manifest-path: ${{ env.SOLUTION_PATH }}
          dotnet-spec-version: '1.6'
          output-path: ${{ env.BOM_FILE }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: ${{ env.BOM_FILE }}
          if-no-files-found: error

      - name: Upload SBOM to Dependency-Track
        if: env.DT_HOST != '' && env.DT_API_KEY != ''
        uses: hoobio/pipeline-tools/pipeline/github/job/upload-sbom-to-dependency-track@v2.3.1
        with:
          bom-path: ${{ env.BOM_FILE }}
          upload-artifact: 'false'
          server-url: https://${{ env.DT_HOST }}
          api-key: ${{ env.DT_API_KEY }}
          domain: ${{ env.DT_DOMAIN }}
          system: ${{ env.DT_SYSTEM }}
          component: ${{ env.DT_COMPONENT }}
          channel: ${{ steps.dt.outputs.channel }}
          sub-channel: ${{ steps.dt.outputs.sub_channel }}
          project-version: ${{ steps.dt.outputs.project_version }}
          project-tags: channel=${{ steps.dt.outputs.channel }},repo=${{ github.repository }},commit=${{ github.sha }},run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          mark-latest: ${{ steps.dt.outputs.mark_latest }}
          prune-stale-children: ${{ steps.dt.outputs.prune }}
          keep: ${{ github.event_name == 'workflow_dispatch' && '1' || '10' }}

      - name: Skip notice if Dependency-Track secrets not configured
        if: env.DT_HOST == '' || env.DT_API_KEY == ''
        shell: bash
        run: echo "::warning::DT_HOST or DT_API_KEY secret not set; skipping Dependency-Track upload."

  release:
    name: Publish Release
    needs: [release-please, lint-and-test, build-msix, build-msi, bundle, wack, sbom]
    if: >-
      always()
      && needs.release-please.outputs.release_created == 'true'
      && needs.lint-and-test.result == 'success'
      && needs.build-msix.result == 'success'
      && needs.build-msi.result == 'success'
      && needs.bundle.result == 'success'
      && needs.wack.result == 'success'
      && needs.sbom.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: write
    steps:
      - name: Download MSIX (x64)
        uses: actions/download-artifact@v8
        with:
          name: msix-x64
          path: release/msix-x64
      - name: Download MSIX (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: msix-ARM64
          path: release/msix-ARM64
      - name: Download MSI (x64)
        uses: actions/download-artifact@v8
        with:
          name: msi-x64
          path: release/msi-x64
      - name: Download MSI (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: msi-ARM64
          path: release/msi-ARM64
      - name: Download SBOM
        uses: actions/download-artifact@v8
        with:
          name: sbom
          path: release/sbom
      - name: Download WACK report (x64)
        uses: actions/download-artifact@v8
        with:
          name: wack-report-x64
          path: release/wack-x64
      - name: Download WACK report (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: wack-report-ARM64
          path: release/wack-ARM64
      - name: Download MSIX bundle
        uses: actions/download-artifact@v8
        with:
          name: msixbundle
          path: release/bundle

      - name: Attest installer provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "release/msix-*/*.msix,release/msi-*/*.msi,release/bundle/*.msixbundle"

      - name: Attach all artefacts to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          mapfile -t RELEASE_FILES < <(find release -type f \( \
            -name '*.msix' -o \
            -name '*.msixbundle' -o \
            -name '*.msi'  -o \
            -name '*.cdx.json' -o \
            -name 'wack-report-*.xml' \))
          if [ "${#RELEASE_FILES[@]}" -eq 0 ]; then
            echo "::error::No release files found to attach"
            exit 1
          fi
          printf 'Attaching: %s\n' "${RELEASE_FILES[@]}"
          gh release upload "$TAG" "${RELEASE_FILES[@]}" --clobber --repo "${{ github.repository }}"

      - name: Append trust signal to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # release-please leaves the release as a draft; the REST endpoint
          # /releases/tags/{tag} returns 404 for drafts (the tag isn't created
          # until publish). `gh release view` lists drafts and matches by name,
          # so we use it to read the current body and `gh release edit` to
          # rewrite it. The draft flip-to-published happens in the next step.
          TAG="${{ needs.release-please.outputs.tag_name }}"
          BODY=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body --jq '.body // ""')
          TRUST=$'\n\n---\n> ✅ WACK certified (x64, ARM64) · \U0001F512 [CodeQL scanned](https://github.com/${{ github.repository }}/actions/workflows/codeql.yml)'
          gh release edit "$TAG" --repo "${{ github.repository }}" --notes "${BODY}${TRUST}"

      # Publish via the release-please App (not GITHUB_TOKEN) so the resulting
      # `release: published` event triggers the SBOM job again with
      # channel=release. GITHUB_TOKEN-driven publishes are silently dropped
      # from follow-up workflow triggers, which is why v1.9.1 only uploaded to
      # Dependency-Track under channel=ci/main.
      - name: Publish draft release
        uses: hoobio/pipeline-tools/pipeline/github/step/publish-github-release@v2.3.1
        with:
          tag: ${{ needs.release-please.outputs.tag_name }}
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          app-private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

  store-publish:
    name: Publish to Microsoft Store
    # Real releases only. Takes the prebuilt .msixbundle artifact and submits it to
    # the Store with the WHATS_NEW.md release notes. msstore uploads one package per
    # submission and matches by extension, hence a single bundle (not two .msix).
    needs: [release-please, bundle, release]
    if: >-
      always()
      && needs.release-please.outputs.release_created == 'true'
      && needs.bundle.result == 'success'
      && needs.release.result == 'success'
    runs-on: windows-latest
    env:
      STORE_PRODUCT_ID: 9P5KS8T80MV3
      WHATS_NEW_PATH: HoobiBitwardenCommandPaletteExtension/Assets/WHATS_NEW.md
    steps:
      - uses: actions/checkout@v7 # for WHATS_NEW.md

      - name: Download MSIX bundle
        uses: actions/download-artifact@v8
        with:
          name: msixbundle
          path: bundle

      - name: Setup Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.3

      - name: Configure Store credentials
        shell: pwsh
        run: |
          msstore reconfigure `
            --tenantId     '${{ secrets.AZURE_TENANT_ID }}' `
            --sellerId     '${{ secrets.SELLER_ID }}' `
            --clientId     '${{ secrets.AZURE_AD_CLIENT_ID }}' `
            --clientSecret '${{ secrets.AZURE_AD_CLIENT_SECRET }}'

      - name: Publish bundle + release notes to Store
        shell: pwsh
        env:
          PRODUCT_ID: ${{ env.STORE_PRODUCT_ID }}
        run: |
          $ErrorActionPreference = 'Stop'
          $bundle = (Get-ChildItem bundle -Filter *.msixbundle | Select-Object -First 1).FullName
          if (-not $bundle) { throw 'No .msixbundle artifact found' }

          # Clear any leftover pending draft so publish starts from the live submission.
          msstore submission delete $env:PRODUCT_ID --no-confirm 2>$null
          $global:LASTEXITCODE = 0

          # Clone the live submission, upload the bundle, hold the commit.
          msstore publish $bundle -id $env:PRODUCT_ID --noCommit
          if ($LASTEXITCODE -ne 0) { throw "msstore publish failed ($LASTEXITCODE)" }

          # Splice in WHATS_NEW.md, and retire any non-bundle (loose .msix) packages
          # the clone carried over. The PendingDelete loop auto-handles the one-time
          # .msix -> .msixbundle migration and is a no-op after that (bundle -> bundle).
          $out = msstore submission get $env:PRODUCT_ID | Out-String
          $s = $out.IndexOf('{'); $e = $out.LastIndexOf('}')
          if ($s -lt 0 -or $e -le $s) { throw 'Could not parse submission JSON from msstore output' }
          $sub = $out.Substring($s, $e - $s + 1) | ConvertFrom-Json

          $sub.Listings.'en-us'.BaseListing.ReleaseNotes = (Get-Content -Raw $env:WHATS_NEW_PATH).TrimEnd()
          foreach ($p in $sub.ApplicationPackages) {
            if ($p.FileName -notlike '*.msixbundle') { $p.FileStatus = 'PendingDelete' }
          }

          $sub | ConvertTo-Json -Depth 100 | Set-Content -Path patched.json -Encoding utf8
          msstore submission updateMetadata $env:PRODUCT_ID (Get-Content -Raw patched.json)
          if ($LASTEXITCODE -ne 0) { throw "updateMetadata failed ($LASTEXITCODE)" }

          msstore submission publish $env:PRODUCT_ID
          if ($LASTEXITCODE -ne 0) { throw "submission publish failed ($LASTEXITCODE)" }
          Write-Host "Submitted $bundle to the Store (product $env:PRODUCT_ID)."

  pre-release:
    name: Pre-Release
    needs: [build-msix, build-msi, bundle, lint-and-test]
    if: >-
      always()
      && github.event_name == 'pull_request'
      && github.head_ref == 'release-please--branches--main'
      && needs.build-msix.result == 'success'
      && needs.build-msi.result == 'success'
      && needs.bundle.result == 'success'
      && needs.lint-and-test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Generate release notes
        id: notes
        run: |
          VERSION_PREFIX="v${{ steps.version.outputs.version }}-pre."
          # Find the most recent pre-release tag for this version, or fall back to last stable tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -m1 "^${VERSION_PREFIX}" || true)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git tag --sort=-version:refname | grep -m1 '^v[0-9]' || true)
          fi
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "$NOTES" > /tmp/release_notes.txt
          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Download MSIX (x64)
        uses: actions/download-artifact@v8
        with:
          name: msix-x64
          path: release/msix-x64

      - name: Download MSIX (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: msix-ARM64
          path: release/msix-ARM64

      - name: Download MSI (x64)
        uses: actions/download-artifact@v8
        with:
          name: msi-x64
          path: release/msi-x64

      - name: Download MSI (ARM64)
        uses: actions/download-artifact@v8
        with:
          name: msi-ARM64
          path: release/msi-ARM64

      - name: Download MSIX bundle
        uses: actions/download-artifact@v8
        with:
          name: msixbundle
          path: release/bundle

      # Create as a draft so action-gh-release can attach assets. On repos
      # with "immutable releases" enabled, publishing a release locks its
      # asset list, and softprops/action-gh-release publishes before
      # uploading - so non-draft prereleases fail with "Cannot upload asset
      # ... to an immutable release". Keeping it as a draft lets the upload
      # complete; the next step flips it to a published prerelease.
      - name: Create pre-release (draft)
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}-pre.${{ github.run_number }}
          name: v${{ steps.version.outputs.version }}-pre.${{ github.run_number }}
          prerelease: true
          draft: true
          make_latest: false
          body_path: /tmp/release_notes.txt
          files: |
            release/**/*.msix
            release/**/*.msixbundle
            release/**/*.msi

      - name: Publish pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ steps.version.outputs.version }}-pre.${{ github.run_number }}
        run: |
          gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false --prerelease

      - name: Prune old pre-releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: 3
        run: |
          VERSION_PREFIX="v${{ steps.version.outputs.version }}-pre."
          RELEASES=$(gh release list \
            --repo ${{ github.repository }} \
            --limit 100 \
            --json tagName,isPrerelease \
            --jq "[.[] | select(.isPrerelease == true and (.tagName | startswith(\"$VERSION_PREFIX\")))] | sort_by(.tagName) | reverse | .[${KEEP}:] | .[].tagName")
          for TAG in $RELEASES; do
            echo "Deleting old pre-release: $TAG"
            gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag
          done
